<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: emerald to teal (diagonal) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#0d9668"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- Top highlight for depth -->
    <linearGradient id="topLight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <!-- Rounded square with gradient -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Top highlight for 3D effect -->
  <rect x="20" y="20" width="472" height="236" rx="100" ry="100" fill="url(#topLight)"/>
  <!-- Inner subtle border -->
  <rect x="28" y="28" width="456" height="456" rx="92" ry="92" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- === MAIN "A" LETTERFORM === -->
  <g>
    <!-- The "A" as a single unified shape -->
    <!-- Bold, geometric A with wide legs -->
    <path d="
      M 256 95
      L 145 390
      L 185 390
      L 218 290
      L 294 290
      L 327 390
      L 367 390
      Z
      M 256 150
      L 282 255
      L 230 255
      Z
    " fill="white" opacity="0.95"/>

    <!-- Fingerprint swirl in the crossbar area -->
    <!-- This replaces the simple crossbar with a biometric theme -->
    <!-- The triangular opening above the crossbar gets fingerprint arcs -->
    
    <!-- Fingerprint ridges inside the A's negative space -->
    <!-- These are subtle white arcs that suggest a fingerprint scan -->
    <g opacity="0.45" stroke="white" fill="none" stroke-linecap="round">
      <path d="M 234 260 Q 256 235 278 260" stroke-width="5"/>
      <path d="M 222 265 Q 256 220 290 265" stroke-width="4.5"/>
      <path d="M 212 270 Q 256 205 300 270" stroke-width="4"/>
      <path d="M 204 278 Q 256 193 308 278" stroke-width="3.5"/>
    </g>
    
    <!-- Fingerprint dot at center of swirl -->
    <circle cx="256" cy="252" r="5" fill="white" opacity="0.5"/>
  </g>

  <!-- === SMALL FINGERPRINT ACCENT (bottom-right) === -->
  <g transform="translate(395, 415)" opacity="0.3" stroke="white" fill="none" stroke-linecap="round">
    <circle cx="0" cy="0" r="3" fill="white" stroke="none"/>
    <path d="M-8,-4 Q0,-13 8,-4" stroke-width="2.5"/>
    <path d="M-14,-1 Q0,-18 14,-1" stroke-width="2.2"/>
    <path d="M-19,3 Q0,-22 19,3" stroke-width="1.8"/>
  </g>

  <!-- === SUBTLE CHECKMARK (top-left, attendance theme) === -->
  <g transform="translate(88, 88)" opacity="0.2" stroke="white" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-14,0 L-5,10 L14,-12" stroke-width="5"/>
  </g>
</svg>
